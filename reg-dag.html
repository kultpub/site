<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Registrera dag</title>
<style>
/* ── 1. BAS & TYPOGRAFI ── */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #f8f9fa;
  --surface: #ffffff;
  --surface2: #f1f3f5;
  --text: #1a1a1a;
  --muted: #6c757d;
  --border: #e9ecef;
  --border2: #dee2e6;
  --accent: #7c4b2a;
  --accent-dark: #5d3820;
  --accent-light: #fdf1e8;
  --success: #2b8a3e;
  --danger: #c92a2a;
  --radius: 16px;
  --radius-md: 12px;
  --radius-sm: 6px;
  --shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html {
  scrollbar-gutter: stable;
}

body {
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 15px;
  color: var(--text);
  background: var(--bg);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

main {
  width: min(1100px, 94vw);
  margin: 0 auto;
  padding: 40px 0 80px;
  display: grid;
  gap: 20px;
}

/* ── 2. HEADER-CARD (Överst på sidan) ── */
.header-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 30px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: flex-end;     /* Sätter rubrik och bubblor på samma snygga baslinje */
  justify-content: space-between;
  gap: 24px;
  flex-wrap: nowrap;         /* Garanterar att de stannar på samma radhöjd */
}

.header-left .kicker {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
}

.header-left h1 {
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -0.03em;
  margin-bottom: 4px;
}

.header-left .dateline {
  font-size: 13px;
  color: var(--muted);
}

/* ── 3. STATISTIK-RAD (I headern) ── */
.stats-row {
  display: flex;
  gap: 12px;                  /* Luftigt och fint avstånd mellan bubblorna */
  flex: 0 0 auto;             /* Låter raden ta precis den plats bubblorna kräver */
  justify-content: flex-end;  /* Trycker bubblorna mot högerkanten */
}

.stat-box {
  background: var(--surface2);
  border-radius: var(--radius-md);
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 115px;         /* Din önskade fasta bredd */
  height: 85px;         /* En fast höjd som ger bra proportioner till 32px ikoner */
  flex: 0 0 115px;      /* Förbjuder flexbox att stretcha eller trycka ihop bredden (0 0) */
  flex-shrink: 0;       /* Extra livrem för att garantera att höjden inte kollapsar */
}

/* Vi behöver inte klassen .wide längre eftersom alla nu har en enhetlig, trygg bredd */
.stat-box.wide {
  flex: 0 0 100px;
}

.stat-box .venue-icon {
  width: 32px;                /* Stor och skarp ikonstorlek */
  height: 32px;
  object-fit: contain;
}

.stat-num {
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 16px;            /* Tydlig sifferstorlek */
  font-weight: 700;
  color: var(--text);
  line-height: 1;
  white-space: nowrap; 
}

.stat-checkbox {
  width: 18px;
  height: 18px;
  border: 2px solid var(--muted);
  border-radius: 4px;
  background: var(--surface);
  position: relative;
  transition: all 0.2s ease;
}

/* När rapporten finns aktiverar vi den här klassen via JavaScript */
.stat-checkbox.checked {
  background: var(--success);
  border-color: var(--success);
}

/* Ritar ut en snygg, skarp bock inuti rutan */
.stat-checkbox.checked::after {
  content: '';
  position: absolute;
  left: 4.5px;
  top: -1px;
  width: 5px;
  height: 10px;
  border: solid white;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}

/* ── 4. PANELER & ACTION GRID (Mitten på sidan) ── */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  box-shadow: var(--shadow);
}

.panel-label {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 20px;
}

.action-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.action-btn {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 22px 24px;         /* Justerat för att matcha förra filens luftighet */
  display: flex;              /* AKTIVERAR FLEXBOX */
  flex-direction: row;        /* Lägger ikon och text sida vid sida */
  align-items: center;        /* Centrerar ikon och text perfekt vertikalt */
  gap: 20px;                  /* Skapar exakt avstånd mellan ikon och text */
  text-align: left;
  cursor: pointer;
  color: var(--text);
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  height: 140px;
}

.icon-wrap {
  flex: 0 0 54px;            /* Förhindrar flexbox från att någonsin krympa ikonen */
  height: 54px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: visible;          /* Livsviktigt för att skalan på 1.5 inte ska klippas bort */
}

.action-btn:hover {
  border-color: var(--accent);
  background: var(--accent-light);
  transform: translateY(-2px);
  box-shadow: 0 10px 15px -3px rgba(124, 75, 42, 0.1);
}

.action-btn .btn-title {
  font-size: 16px;
  font-weight: 600;
  display: block;
  margin-bottom: 6px;
}

.action-btn .btn-desc {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.5;
}

/* ── 5. ENTRIES-LISTA (Nedre panelen) ── */
.entries-list { display: grid; gap: 10px; }

.entry-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  transition: all 0.2s ease;
  cursor: pointer;
  animation: slideIn .2s ease;
}

.entry-row:hover {
  border-color: var(--accent);
  background: var(--surface2);
  transform: translateX(4px);
}

.entry-badge {
  font-size: 11px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
  display: flex;          /* AKTIVERA HÄR OCKSÅ */
  align-items: center;    /* Centrera miniatyrikonen vertikalt med texten */
  gap: 4px;               /* Snyggt avstånd mellan SVG och text */
  width: 140px;
  justify-content: flex-start;
}

.badge-school  { background: #e7f5ff; color: #1971c2; }
.badge-group   { background: #ebfbee; color: #2f9e44; }
.badge-cafe    { background: #fff9db; color: #f08c00; }
.badge-tickets { background: #fff0f6; color: #d6336c; }
.badge-sales   { background: #f8f9fa; color: #495057; }
.badge-daily   { background: #f3f0ff; color: #7048e8; }

.entry-body { flex: 1; min-width: 0; }

.entry-title { 
  font-size: 15px; 
  font-weight: 600; 
  margin-bottom: 4px; 
  white-space: nowrap;
}

.entry-title.truncate {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 500px;
}

.entry-meta  { font-size: 13px; color: var(--muted); }

.entry-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  text-align: right;
  line-height: 1.4;
}

.entry-time strong {
  display: block;
  font-size: 12px;
  color: var(--text);
  font-weight: 500;
}

/* ── 6. MODALER & OVERLAYS ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 16px;
  z-index: 100;
  backdrop-filter: blur(4px);
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border-radius: var(--radius);
  width: min(700px, 96vw);
  overflow-y: visible;
  padding: 32px;
  box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
  animation: modalIn .18s ease;
}

.modal.narrow { width: min(400px, 96vw); }

.modal-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 22px;
}

.modal-top h2 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.modal-close {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.modal-close::before, .modal-close::after {
  content: '';
  position: absolute;
  width: 18px;
  height: 2px;
  background-color: var(--text);
  border-radius: 2px;
}
.modal-close::before { transform: rotate(45deg); }
.modal-close::after { transform: rotate(-45deg); }

.modal-close:hover {
  background-color: var(--danger);
  border-color: var(--danger);
  transform: rotate(90deg);
}
.modal-close:hover::before, .modal-close:hover::after {
  background-color: #fff;
}

/* Specifika färger för ikonerna i knapparna */
.action-btn[data-modal="school"] .fa-icon  { fill: #1971c2; } /* Blå */
.action-btn[data-modal="group"] .fa-icon   { fill: #2f9e44; } /* Grön */
.action-btn[data-modal="daily"] .fa-icon   { fill: #7048e8; } /* Lila */
.action-btn[data-modal="tickets"] .fa-icon { fill: #d6336c; } /* Rosa */
.action-btn[data-modal="sales"] .fa-icon   { fill: #495057; } /* Grå/Svart */
.action-btn[data-modal="cafe"] .fa-icon    { fill: #f08c00; } /* Orange */

/* Behåll hover-effekten men se till att den inte skriver över färgerna tråkigt */
.action-btn:hover .fa-icon { 
    transform: scale(1.1); 
    filter: brightness(0.9); /* Gör färgen aningen mörkare vid hover */
}

/* ── 7. FORMULÄR, INPUTS & SELECTS ── */
.field-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
  margin-top: 16px;
  display: block;
}

.field-label:first-child { margin-top: 0; }

select, input, textarea {
  width: 100%;
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 12px;
  font-family: inherit;
  font-size: 15px;
  transition: all 0.2s;
}

select:focus, input:focus, textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-light);
}

textarea { min-height: 120px; resize: vertical; }

input::placeholder, textarea::placeholder {
  color: var(--muted);
  opacity: 0.6;
  font-style: italic;
}

/* Datum-input specifikt */
.date-input-container {
  position: relative;
  width: 220px;
  display: flex;
  align-items: center;
}

.date-display-field {
  width: 100% !important;
  cursor: pointer;
  background: #fff !important;
  padding-right: 40px !important;
}

.date-icon {
  position: absolute;
  right: 12px;
  width: 18px;
  height: 18px;
  fill: var(--muted);
  pointer-events: auto;
  cursor: pointer;
  transition: fill 0.2s;
}

.date-input-container:hover .date-icon {
  fill: var(--accent);
}

input[type="date"] {
  width: 200px;
  min-width: 150px; 
}

/* Custom-select komponenter */
.custom-select-wrapper { position: relative; width: 100%; user-select: none; }

.custom-select-trigger {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px; border: 1px solid var(--border2);
  border-radius: var(--radius-sm); background: var(--surface);
  cursor: pointer; font-size: 15px; color: var(--text);
  transition: border-color 0.2s;
}

.custom-select-trigger:hover,
.custom-select-wrapper.open .custom-select-trigger {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-light);
}

.chevron {
  width: 16px; height: 16px; fill: var(--muted);
  transition: transform 0.2s; flex-shrink: 0;
}

.custom-select-wrapper.open .chevron { transform: rotate(180deg); }

.custom-select-dropdown {
  display: none; position: absolute; top: calc(100% + 4px); left: 0;
  min-width: 500px;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--radius-sm); z-index: 200;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
}

.custom-select-wrapper.open .custom-select-dropdown { display: block; }

.dropdown-cols { display: grid; grid-template-columns: repeat(4, 1fr); grid-auto-flow: column; grid-template-rows: repeat(9, auto); padding: 8px; gap: 2px; }
.dropdown-cols-2 { display: grid; grid-template-columns: repeat(2, 1fr); grid-auto-flow: column; grid-template-rows: repeat(7, auto); padding: 8px; gap: 2px; }
.dropdown-cols-2-r4 { display: grid; grid-template-columns: repeat(2, 1fr); grid-auto-flow: column; grid-template-rows: repeat(4, auto); padding: 8px; gap: 2px; }

.dropdown-option {
  padding: 7px 10px; border-radius: 4px; cursor: pointer;
  font-size: 14px; color: var(--text); transition: background 0.1s;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.dropdown-option:hover { background: var(--accent-light); color: var(--accent); }
.dropdown-option.selected { background: var(--accent-light); color: var(--accent); font-weight: 600; }

/* Belopps-wrapper */
.amount-wrapper { position: relative; }

.amount-prefix {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-family: 'Inter', sans-serif; 
  font-weight: 500;
  pointer-events: none;
}

.amount-wrapper input { 
  padding-left: 36px; 
  font-family: 'Inter', sans-serif;
  font-variant-numeric: tabular-nums; 
}

/* ── 8. FORM-LAYOUT & KNAPPAR ── */
.form-row {
  display: flex;
  gap: 12px;
  margin-top: 16px;
}

.field-group {
  display: flex;
  flex-direction: column;
}

.main-field { flex: 0 0 80%; }
.side-field { flex: 1; }

.form-row .field-label { margin-top: 0; }

.form-row-triple {
  display: flex;
  gap: 12px;
  margin-top: 16px;
  align-items: flex-end;
}

.col-45 { flex: 0 0 calc(45% - 8px); }
.col-35 { flex: 0 0 calc(35% - 8px); }
.col-20 { flex: 0 0 calc(20% - 8px); }

.form-row-triple .field-group { min-width: 0; }
.form-row-triple .field-label { margin-top: 0; }

.form-footer {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}

.btn-primary {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 30px;
  padding: 10px 24px;
  font-weight: 600;
  cursor: pointer;
  transition: background .2s;
}
.btn-primary:hover { background: var(--accent-dark); }

.btn-secondary {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 30px;
  padding: 10px 20px;
  font-weight: 500;
  cursor: pointer;
}

.btn-danger {
  color: var(--danger);
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 30px;
  padding: 10px 20px;
  margin-right: auto;
  cursor: pointer;
}
.btn-danger:hover { background: #fff5f5; border-color: var(--danger); }

/* ── 9. IKONER & ANIMATIONER ── */
.fa-icon {
  width: 50px;
  height: 50px;
  object-fit: contain;
  display: block;
  transition: transform .28s cubic-bezier(.34,1.56,.64,1);
  will-change: transform;
  
  /* LÄGG TILL DESSA TVÅ RADER FÖR ULTRA-SKÄRPA: */
  shape-rendering: geometricPrecision;
  image-rendering: -webkit-optimize-contrast;
}

/* Trigga förstoringen på ikonen så fort man hovrar var som helst på knappen */
.action-btn:hover .icon-wrap .fa-icon {
  transform: scale(1.5);
}

.badge-icon {
  width: 14px;
  height: 14px;
  display: inline-block;
  vertical-align: middle;
  margin-right: 6px;
  /* Säkerställ att den ärver badgens textfärg och inte blir var(--accent)-brun */
  fill: currentColor; 
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(.97) translateY(6px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

/* Lägg till längst ner i sektion 1 (Bas & Typografi), precis innan .header-card */
.top-action-bar {
  position: absolute;
  right: 40px;
  top: 40px; /* Placerar knappen klockrent i höjdlinje ovanför header-kortet */
  z-index: 10;
}

.btn-send-data {
  background: var(--success);
  color: #fff;
  border: none;
  border-radius: 30px;
  padding: 10px 24px;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(43, 138, 62, 0.25);
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}

.btn-send-data:hover {
  background: #237032;
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(43, 138, 62, 0.35);
}

.btn-send-data:active {
  transform: translateY(0);
}

/* ── 10. RESPONSIVITET ── */
@media (max-width: 700px) {
  .top-action-bar {
    position: static;
    display: flex;
    justify-content: flex-end;
    margin-bottom: 0;
  }
}

@media (max-width: 700px) {
  .action-grid { grid-template-columns: 1fr 1fr; }
}

@media (max-width: 600px) {
  .col-45, .col-35, .col-20 {
    flex: 0 0 100% !important;
    width: 100%;
  }
}
</style>
</head>
<body>

  <main>
  
<div class="top-action-bar">
    <button class="btn-send-data" onclick="sendDataEmail()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      Skicka dagsdata
    </button>
  </div>  
    <!-- 1. Header & Statistik -->
    <div class="header-card">
<div class="header-left">
  <div class="kicker">Registrera</div>
  <h1>Dagsresultat</h1>
  <div class="dateline" id="dateline">Skolor, grupper, intäkter</div>
</div>

	  <div class="stats-row">
        <div class="stat-box" id="statBox_school" title="Skolbesök">
          <img src="skola.svg" alt="" class="venue-icon">
          <div class="stat-num" id="statSchool">0</div>
        </div>
        <div class="stat-box" id="statBox_group" title="Gruppbesök">
          <img src="grupp.svg" alt="" class="venue-icon">
          <div class="stat-num" id="statGroup">0</div>
        </div>
        <div class="stat-box" id="statBox_tickets" title="Entréintäkter">
          <img src="entre.svg" alt="" class="venue-icon">
          <div class="stat-num" id="statTickets">0,00</div>
        </div>
        <div class="stat-box" id="statBox_sales" title="Butiksförsäljning">
          <img src="butik.svg" alt="" class="venue-icon">
          <div class="stat-num" id="statSales">0,00</div>
        </div>
        <div class="stat-box" id="statBox_cafe" title="Kaféförsäljning">
          <img src="kafe.svg" alt="" class="venue-icon">
          <div class="stat-num" id="statCafe">0,00</div>
        </div>
        <div class="stat-box" id="statBox_daily" title="Dagsrapport">
          <img src="dagsrapport.svg" alt="" class="venue-icon">
          <div class="stat-checkbox" id="statDaily"></div>
        </div>
      </div>
    </div>

    <!-- 2. Action Grid (Registrera händelse) -->
<!-- 2. Action Grid (Registrera händelse) -->
    <div class="panel">
      <div class="panel-label">Registrera händelse</div>
      <div class="action-grid">
        
        <button class="action-btn" data-modal="school">
          <div class="icon-wrap">
            <img src="skola.svg" alt="" class="fa-icon">
          </div>
          <div class="btn-text-group">
            <span class="btn-title">Skolbesök</span>
            <span class="btn-desc">Kommun, nivå, antal</span>
          </div>
        </button>

        <button class="action-btn" data-modal="group">
          <div class="icon-wrap">
            <img src="grupp.svg" alt="" class="fa-icon">
          </div>
          <div class="btn-text-group">
            <span class="btn-title">Gruppbesök</span>
            <span class="btn-desc">Visningar, bröllop, konferens etc.</span>
          </div>
        </button>

        <button class="action-btn" data-modal="tickets">
          <div class="icon-wrap">
            <img src="entre.svg" alt="" class="fa-icon">
          </div>
          <div class="btn-text-group">
            <span class="btn-title">Entréintäkter</span>
            <span class="btn-desc">Dagstotal kr</span>
          </div>
        </button>

        <button class="action-btn" data-modal="sales">
          <div class="icon-wrap">
            <img src="butik.svg" alt="" class="fa-icon">
          </div>
          <div class="btn-text-group">
            <span class="btn-title">Butiksförsäljning</span>
            <span class="btn-desc">Dagstotal kr</span>
          </div>
        </button>

        <button class="action-btn" data-modal="cafe">
          <div class="icon-wrap">
            <img src="kafe.svg" alt="" class="fa-icon">
          </div>
          <div class="btn-text-group">
            <span class="btn-title">Kaféförsäljning</span>
            <span class="btn-desc">Dagstotal kr</span>
          </div>
        </button>
		
        <button class="action-btn" data-modal="daily">
          <div class="icon-wrap">
            <img src="dagsrapport.svg" alt="" class="fa-icon">
          </div>
          <div class="btn-text-group">
            <span class="btn-title">Dagsrapport</span>
            <span class="btn-desc">Logga dagen</span>
          </div>
        </button>		

      </div>
    </div>

    <!-- 3. Loggade händelser -->
    <div class="panel">
      <div class="panel-label">Loggade händelser</div>
      <div class="entries-list" id="entriesList">
        <div class="empty-state" id="emptyState" style="color:var(--muted);font-size:14px;">Inga händelser registrerade än.</div>
      </div>
    </div>
  </main>

  <!-- 4. Modaler & Overlays -->
  <!-- Registreringsmodal -->
  <div class="modal-overlay" id="overlay">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-top">
        <h2 id="modalTitle">Registrering</h2>
        <button class="modal-close" id="modalClose" aria-label="Stäng"></button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- Raderingsmodal -->
  <div class="modal-overlay" id="deleteOverlay">
    <div class="modal" style="max-width: 400px; text-align: center;">
      <div style="width: 56px; height: 56px; border-radius: 50%; background: #fff5f5; border: 1px solid #ffc9c9; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6" />
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
          <path d="M10 11v6" />
          <path d="M14 11v6" />
          <path d="M9 6V4h6v2" />
        </svg>
      </div>
      <h2 style="font-size: 18px; font-weight: 700; margin-bottom: 8px;">Radera post?</h2>
      <p style="color: var(--muted); font-size: 14px; margin-bottom: 28px;">Detta går inte att ångra.</p>
      <div style="display: flex; gap: 10px; justify-content: center;">
        <button class="btn-secondary" onclick="closeDeleteModal()">Avbryt</button>
        <button class="btn-danger" style="background: var(--danger); color: #fff; border-radius: 30px; padding: 10px 24px; font-weight: 600; border: none; cursor: pointer; margin-right: 0;" onclick="confirmDelete()">Ja, radera</button>
      </div>
    </div>
  </div>

<script>
const TYPE_LABELS = {
  school: "skolbesök",
  group: "gruppbesök",
  tickets: "entréintäkt",
  sales: "butiksförsäljning",
  cafe: "kaféförsäljning",
  daily: "dagsrapport"
};
// --- DATAKONFIGURATION ---
const ICONS = {
  school: '<svg class="badge-icon" viewBox="0 0 640 512"><path fill="currentColor" d="M0 224v272c0 8.84 7.16 16 16 16h80V192H32c-17.67 0-32 14.33-32 32zm360-48h-24v-40c0-4.42-3.58-8-8-8h-16c-4.42 0-8 3.58-8 8v64c0 4.42 3.58 8 8 8h48c4.42 0 8-3.58 8-8v-16c0-4.42-3.58-8-8-8zm137.75-63.96l-160-106.67a32.02 32.02 0 0 0-35.5 0l-160 106.67A32.002 32.002 0 0 0 128 138.66V512h128V368c0-8.84 7.16-16 16-16h96c8.84 0 16 7.16 16 16v144h128V138.67c0-10.7-5.35-20.7-14.25-26.63z"/></svg>',
  group: '<svg class="badge-icon" viewBox="0 0 640 512"><path fill="currentColor" d="M96 224c35.3 0 64-28.7 64-64s-28.7-64-64-64-64 28.7-64 64 28.7 64 64 64zm448 0c35.3 0 64-28.7 64-64s-28.7-64-64-64-64 28.7-64 64 28.7 64 64 64zM320 256c61.9 0 112-50.1 112-112S381.9 32 320 32 208 82.1 208 144s50.1 112 112 112z"/></svg>',
  tickets: '<svg class="badge-icon" viewBox="0 0 576 512"><path fill="currentColor" d="M128 160h320v192H128V160zm400 96c0 26.51 21.49 48 48 48v96c0 26.51-21.49 48-48 48H48c-26.51 0-48-21.49-48-48v-96c26.51 0 48-21.49 48-48s-21.49-48-48-48v-96c0-26.51 21.49-48 48-48h480c26.51 0 48 21.49 48 48v96c-26.51 0-48 21.49-48 48z"/></svg>',
  sales: '<svg class="badge-icon" viewBox="0 0 448 512"><path fill="currentColor" d="M352 160v-32C352 57.42 294.579 0 224 0 153.42 0 96 57.42 96 128v32H0v272c0 44.183 35.817 80 80 80h288c44.183 0 80-35.817 80-80V160h-96z"/></svg>',
  cafe: '<svg class="badge-icon" viewBox="0 0 640 512"><path fill="currentColor" d="M192 384h192c53 0 96-43 96-96h32c70.6 0 128-57.4 128-128S582.6 32 512 32H120c-13.3 0-24 10.7-24 24v232c0 53 43 96 96 96z"/></svg>',
  daily: '<svg class="badge-icon" viewBox="0 0 512 512"><path fill="currentColor" d="M497.9 142.1l-46.1 46.1c-4.7 4.7-12.3 4.7-17 0l-111-111c-4.7-4.7-4.7-12.3 0-17l46.1-46.1c18.7-18.7 49.1-18.7 67.9 0l60.1 60.1c18.8 18.7 18.8 49.1 0 67.9z"/></svg>'
};

const PLACES = ["Bjuv","Bromölla","Burlöv","Båstad","Eslöv","Helsingborg","Hässleholm","Höganäs","Hörby","Höör","Klippan","Kristianstad","Kävlinge","Landskrona","Lomma","Lund","Malmö","Osby","Perstorp","Simrishamn","Sjöbo","Skurup","Staffanstorp","Svalöv","Svedala","Tomelilla","Trelleborg","Vellinge","Ystad","Åstorp","Ängelholm","Örkelljunga","Östra Göinge","Övrigt"];
const BASE_LEVELS = ["Förskola","Förskoleklass","Åk 1","Åk 2","Åk 3","Åk 4","Åk 5","Åk 6","Åk 7","Åk 8","Åk 9","Gymnasium","Vuxenutbildning"];
const EXTRA = { Lund:["Lunds universitet"], Helsingborg:["Campus Helsingborg"], Malmö:["Malmö universitet"], Kristianstad:["Högskolan Kristianstad"], Lomma:["SLU"], Övrigt:["Högskola, universitet"] };
const GROUP_TYPES = ["", "Barnkalas", "Bröllop", "Konferens", "Kostnadsfri lokalupplåtelse", "Programvisning", "Visning mot betalning", "Nordenstedtska seminariet", "Övrigt"];
const MONTHS_SHORT = ["Jan", "Feb", "Mar", "Apr", "Maj", "Jun", "Jul", "Aug", "Sep", "Okt", "Nov", "Dec"];

let entries = [];
let activeModal = null;
let editingId = null;

// --- HJÄLPFUNKTIONER ---
function getDayName(dateStr) {
  const date = new Date(dateStr);
  return date.toLocaleDateString('sv-SE', { weekday: 'long' });
}

function updateDateDisplay(newDate) {
  const displayField = document.getElementById('fDateDisplay');
  if (displayField) {
    displayField.value = `${newDate} ${getDayName(newDate)}`;
  }
}

// Formaterar heltal till "# ###"
function fmtInt(n) {
  return Math.round(n).toLocaleString("sv-SE").replace(/\,/g, " ");
}

// Formaterar belopp till "# ###,##"
function fmtMoney(n) {
  return n.toLocaleString("sv-SE", {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });
}

function swDate() {
  const now = new Date();
  const iso = new Intl.DateTimeFormat("sv-SE",{year:"numeric",month:"2-digit",day:"2-digit"}).format(now);
  return { iso };
}
const TODAY = swDate();

function esc(v) { return String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function renderTimeInfo(e) {
  const visitDate = e.ts.split('T')[0];
  const logDate = e.logTs.split('T')[0];
  const logTime = new Date(e.logTs).toLocaleTimeString("sv-SE", {hour:"2-digit", minute:"2-digit"});
  return `<strong>${visitDate}</strong><span>Loggat: ${logDate} ${logTime}</span>`;
}

function updateStats() {
  const getSum = (type) => entries.filter(e => e.type === type).reduce((s, e) => s + (e.count || 0), 0);
  const getRev = (type) => entries.filter(e => e.type === type).reduce((s, e) => s + (e.amount || 0), 0);

  // Antal besökare
  document.getElementById("statSchool").textContent = fmtInt(getSum("school"));
  document.getElementById("statGroup").textContent  = fmtInt(getSum("group"));
  
  // Separata intäkter
  document.getElementById("statTickets").textContent = fmtMoney(getRev("tickets"));
  document.getElementById("statSales").textContent   = fmtMoney(getRev("sales"));
  document.getElementById("statCafe").textContent    = fmtMoney(getRev("cafe"));

  // Kontrollera om dagsrapport är skriven
  const hasDaily = entries.some(e => e.type === "daily");
  const dailyBox = document.getElementById("statDaily");
  if (dailyBox) {
    dailyBox.classList.toggle("checked", hasDaily);
  }
}

function renderEntries() {
  const list = document.getElementById("entriesList");
  const empty = document.getElementById("emptyState");
  list.querySelectorAll(".entry-row").forEach(r=>r.remove());
  if (!entries.length) { empty.style.display="block"; updateStats(); return; }
  empty.style.display = "none";
  const sorted = [...entries].sort((a,b) => new Date(b.logTs) - new Date(a.logTs));
  sorted.forEach(e => {
    const row = document.createElement("div");
    row.className = "entry-row";
    row.innerHTML = entryHtml(e);
    row.onclick = () => openEditModal(e);
    list.appendChild(row);
  });
  updateStats();
}

function entryHtml(e) {
  const timeInfo = renderTimeInfo(e);
  const icon = ICONS[e.type] || '';
  const label = TYPE_LABELS[e.type] || e.type;

  let content = "";

  if (e.type === "school") {
    const noteRaw = e.school || ""; 
    const noteTruncated = noteRaw.length > 50 ? noteRaw.substring(0, 50) + "..." : noteRaw;
    
    // 1. Börja med den obligatoriska delen
    let titleString = `${esc(e.place)} – ${esc(e.level)}`;
    
    // 2. Lägg bara till bindestreck och notering om det faktiskt finns en notering
    if (noteTruncated) {
      titleString += ` – ${esc(noteTruncated)}`;
    }

    content = `
      <div class="entry-title">${titleString}</div>
      <div class="entry-meta">${fmtInt(e.count)} pers</div>`;
  } 
	else if (e.type === "group") {
		const paidBadge = e.paid ? ` · <span style="color:${e.paid === 'Ja' ? 'var(--success)' : 'var(--danger)'}; font-weight:600;">Betald: ${e.paid}</span>` : "";
		content = `
		  <div class="entry-title">${esc(e.groupType)}</div>
		  <div class="entry-meta">${fmtInt(e.count)} pers${paidBadge}${e.note ? " · " + esc(e.note) : ""}</div>`;
	  }
	else if (["tickets", "sales", "cafe"].includes(e.type)) {
		content = `
	      <div class="entry-title">${fmtMoney(e.amount)} kr</div>
		  <div class="entry-meta">${label}</div>`;
	  } 
  else if (e.type === "daily") {
    content = `
      <div class="entry-title truncate" style="font-weight:400;" title="${esc(e.report)}">${esc(e.report)}</div>
      <div class="entry-meta">Dagsrapport</div>`;
  }
  
  return `<span class="entry-badge badge-${e.type}">${icon} ${label}</span><div class="entry-body">${content}</div><div class="entry-time">${timeInfo}</div>`;
}

// --- FORMULÄR ---
function buildDateField(val) {
  const dateVal = val || TODAY.iso;
  const displayVal = `${dateVal} ${getDayName(dateVal)}`;
  
  return `
    <label class="field-label">Avser dag</label>
    <div class="date-input-container">
      <input type="text" id="fDateDisplay" value="${displayVal}" readonly 
             onclick="document.getElementById('fDate').showPicker()" 
             class="date-display-field">
      
      <!-- Kalenderikon -->
      <svg class="date-icon" viewBox="0 0 448 512" onclick="document.getElementById('fDate').showPicker()">
        <path d="M128 0c17.7 0 32 14.3 32 32V64H288V32c0-17.7 14.3-32 32-32s32 14.3 32 32V64h48c26.5 0 48 21.5 48 48v48H0V112C0 85.5 21.5 64 48 64H96V32c0-17.7 14.3-32 32-32zM0 192H448V464c0 26.5-21.5 48-48 48H48c-26.5 0-48-21.5-48-48V192zM312 304a32 32 0 1 0 0-64 32 32 0 1 0 0 64z"/>
      </svg>
      
      <input type="date" id="fDate" value="${dateVal}" max="${TODAY.iso}" 
             style="position: absolute; opacity: 0; pointer-events: none;"
             onchange="updateDateDisplay(this.value)">
    </div>
  `;
}

function buildFormFooter(isEdit) {
  return `<div class="form-footer"><span class="status-msg" id="formStatus"></span>${isEdit ? `<button class="btn-danger" onclick="deleteEntry()">Radera</button>` : ''}<button class="btn-secondary" onclick="closeModal()">Avbryt</button><button class="btn-primary" id="saveBtn">${isEdit ? 'Spara ändringar' : 'Spara'}</button></div>`;
}

function buildSchoolForm(e) {
  const isEdit = !!e;
  const place = e ? e.place : "Lund";
  const levels = [...BASE_LEVELS, ...(EXTRA[place] || [])];
  const selectedLevel = e ? e.level : levels[0];

  return `
    ${buildDateField(e ? e.ts.split('T')[0] : null)}
    <div class="form-row-triple">
      <div class="field-group col-45">
        <label class="field-label">Ort / kommun</label>
        <div class="custom-select-wrapper" id="placeSelectWrapper">
          <div class="custom-select-trigger" id="placeSelectTrigger">
            <span id="placeSelectLabel">${esc(place)}</span>
            <svg class="chevron" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
          </div>
          <div class="custom-select-dropdown">
            <div class="dropdown-cols" id="placeDropdownCols"></div>
          </div>
        </div>
        <input type="hidden" id="fPlace" value="${esc(place)}" />
      </div>
      <div class="field-group col-35">
        <label class="field-label">Skolnivå</label>
        <div class="custom-select-wrapper" id="levelSelectWrapper">
          <div class="custom-select-trigger" id="levelSelectTrigger">
            <span id="levelSelectLabel">${esc(selectedLevel)}</span>
            <svg class="chevron" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
          </div>
          <div class="custom-select-dropdown">
            <div class="dropdown-cols-2" id="levelDropdownCols"></div>
          </div>
        </div>
        <input type="hidden" id="fLevel" value="${esc(selectedLevel)}" />
      </div>
      <div class="field-group col-20">
        <label class="field-label">Antal</label>
        <input type="number" id="fCount" inputmode="numeric" value="${e ? e.count : ''}" />
      </div>
    </div>
    <label class="field-label">Valfri notering</label>
    <input type="text" id="fSchool" placeholder="Skolans namn / Institution..." value="${e ? esc(e.school) : ''}" />
    ${buildFormFooter(isEdit)}`;
}

function buildGroupForm(e) {
  const isEdit = !!e;
  const selectedType = e ? e.groupType : "";
  const hasPaymentInfo = e && (e.paid === "Ja" || e.paid === "Nej");

  return `
    ${buildDateField(e ? e.ts.split('T')[0] : null)}
    <div class="form-row">
      <div class="field-group main-field">
        <label class="field-label">Typ av grupp</label>
        <div class="custom-select-wrapper" id="groupTypeWrapper">
          <div class="custom-select-trigger" id="groupTypeTrigger">
            <span id="groupTypeLabel">${selectedType ? esc(selectedType) : "Välj typ…"}</span>
            <svg class="chevron" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
          </div>
          <div class="custom-select-dropdown">
            <div class="dropdown-cols-2-r4" id="groupTypeDropdownCols"></div>
          </div>
        </div>
        <input type="hidden" id="fGroupType" value="${esc(selectedType)}" />
      </div>
      <div class="field-group side-field">
        <label class="field-label">Antal</label>
        <input type="number" id="fCount" inputmode="numeric" value="${e ? e.count : ''}" />
      </div>
    </div>
    
    <div id="paymentStatusRow" style="margin-top: 16px;"></div>

    <label class="field-label">Valfri notering</label>
    <input type="text" id="fNote" value="${e ? esc(e.note) : ''}" />
    ${buildFormFooter(isEdit)}`;
}

function buildAmountForm(e, label) {
  const isEdit = !!e;
  const currentAmount = e ? e.amount : "";
  return `
    ${buildDateField(e ? e.ts.split('T')[0] : null)}
    <label class="field-label">Totalbelopp</label>
    <div class="amount-wrapper">
      <span class="amount-prefix">kr</span>
      <input type="number" id="fTotalAmount" inputmode="decimal" placeholder="Ange dagssumma" value="${currentAmount}" style="width: 220px;" />
    </div>
    ${buildFormFooter(isEdit)}`;
}

function buildDailyForm(e) {
  const isEdit = !!e;
  return `${buildDateField(e ? e.ts.split('T')[0] : null)}<label class="field-label">Rapport</label><textarea id="fReport">${e ? esc(e.report) : ''}</textarea>${buildFormFooter(isEdit)}`;
}

// --- LOGIK ---
function openModal(key, entry = null) {
  activeModal = key;
  if (!entry && ["cafe", "tickets", "sales", "daily"].includes(key)) {
      entry = entries.find(e => e.type === key && e.ts.split('T')[0] === (document.getElementById("fDate")?.value || TODAY.iso));
  }
  editingId = entry ? entry.id : null;
  const builders = { school:buildSchoolForm, group:buildGroupForm, tickets:()=>buildAmountForm(entry,"Entré"), sales:()=>buildAmountForm(entry,"Butik"), cafe:()=>buildAmountForm(entry,"Kafé"), daily:buildDailyForm };
  const label = TYPE_LABELS[key] || key;
  document.getElementById("modalTitle").textContent = (entry ? "Redigera " : "Registrera ") + label;
  document.getElementById("modalBody").innerHTML = builders[key](entry);
  document.getElementById("overlay").classList.add("open");
  const modalEl = document.querySelector(".modal");
  if (["tickets", "sales", "cafe"].includes(key)) {
    modalEl.classList.add("narrow");
  } else {
    modalEl.classList.remove("narrow");
  }
if (activeModal === "school") {
  initPlaceSelect();
}
if (activeModal === "group") {
  initGroupTypeSelect();
}
  document.getElementById("saveBtn").addEventListener("click", saveEntry);
}

function initPlaceSelect() {
  const wrapper = document.getElementById("placeSelectWrapper");
  const trigger = document.getElementById("placeSelectTrigger");
  const labelEl = document.getElementById("placeSelectLabel");
  const hidden  = document.getElementById("fPlace");
  const cols    = document.getElementById("placeDropdownCols");

  PLACES.forEach(p => {
    const opt = document.createElement("div");
    opt.className = "dropdown-option" + (p === hidden.value ? " selected" : "");
    opt.textContent = p;
    opt.addEventListener("click", () => {
      hidden.value = p;
      labelEl.textContent = p;
      wrapper.querySelectorAll(".dropdown-option").forEach(o => o.classList.remove("selected"));
      opt.classList.add("selected");
      wrapper.classList.remove("open");
      const levels = [...BASE_LEVELS, ...(EXTRA[p] || [])];
      initLevelSelect(levels, null);
    });
    cols.appendChild(opt);
  });

  trigger.addEventListener("click", e => {
    e.stopPropagation();
    document.querySelectorAll(".custom-select-wrapper.open")
      .forEach(w => { if (w !== wrapper) w.classList.remove("open"); });
    wrapper.classList.toggle("open");
  });

  wrapper.querySelector(".custom-select-dropdown")
    .addEventListener("click", e => e.stopPropagation());

  const currentPlace = hidden.value;
  const levels = [...BASE_LEVELS, ...(EXTRA[currentPlace] || [])];
  const currentLevel = document.getElementById("fLevel").value || levels[0];
  initLevelSelect(levels, currentLevel);
}

function initLevelSelect(levels, selectedLevel) {
  const wrapper = document.getElementById("levelSelectWrapper");
  const hidden  = document.getElementById("fLevel");
  const cols    = document.getElementById("levelDropdownCols");

  // Klona trigger innan vi gör något annat — rensar gamla lyssnare
  const oldTrigger = document.getElementById("levelSelectTrigger");
  const newTrigger = oldTrigger.cloneNode(true);
  oldTrigger.parentNode.replaceChild(newTrigger, oldTrigger);

  // Hämta labelEl från den nya triggern
  const labelEl = newTrigger.querySelector("#levelSelectLabel");

  cols.innerHTML = "";
  hidden.value = selectedLevel || "";
  labelEl.textContent = selectedLevel || "Välj nivå…";

  levels.forEach(l => {
    const opt = document.createElement("div");
    opt.className = "dropdown-option" + (l === selectedLevel ? " selected" : "");
    opt.textContent = l;
    opt.addEventListener("click", () => {
      hidden.value = l;
      labelEl.textContent = l;
      wrapper.querySelectorAll(".dropdown-option").forEach(o => o.classList.remove("selected"));
      opt.classList.add("selected");
      wrapper.classList.remove("open");
    });
    cols.appendChild(opt);
  });

  newTrigger.addEventListener("click", ev => {
    ev.stopPropagation();
    document.querySelectorAll(".custom-select-wrapper.open")
      .forEach(w => { if (w !== wrapper) w.classList.remove("open"); });
    wrapper.classList.toggle("open");
  });

  wrapper.querySelector(".custom-select-dropdown")
    .addEventListener("click", ev => ev.stopPropagation());
}

function initGroupTypeSelect() {
  const wrapper = document.getElementById("groupTypeWrapper");
  const hidden  = document.getElementById("fGroupType");
  const cols    = document.getElementById("groupTypeDropdownCols");

  const oldTrigger = document.getElementById("groupTypeTrigger");
  const newTrigger = oldTrigger.cloneNode(true);
  oldTrigger.parentNode.replaceChild(newTrigger, oldTrigger);
  const labelEl = newTrigger.querySelector("#groupTypeLabel");

  const sortedTypes = [...GROUP_TYPES].filter(t => t !== "").sort((a,b) => a.localeCompare(b, 'sv'));
  const selectedType = hidden.value;

  cols.innerHTML = "";

  // Funktion för att visa/dölja betalningsfrågan
  const togglePaymentField = (type) => {
    const container = document.getElementById("paymentStatusRow");
    if (!container) return;
    
    const triggerTypes = ["Bröllop", "Barnkalas", "Visning mot betalning"];
    if (triggerTypes.includes(type)) {
      // Hämta befintligt värde om vi redigerar en post
      const currentEntry = entries.find(e => e.id === editingId);
      const isPaid = currentEntry ? currentEntry.paid : "";

      container.innerHTML = `
        <div style="display: flex; align-items: center; gap: 16px; background: var(--surface2); padding: 12px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border2);">
          <span style="font-weight: 600; font-size: 14px; color: var(--text);">Har betalats?</span>
          <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 14px;">
            <input type="radio" name="fPaid" value="Ja" ${isPaid === "Ja" ? "checked" : ""} style="width: auto; cursor: pointer;"> Ja
          </label>
          <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 14px;">
            <input type="radio" name="fPaid" value="Nej" ${isPaid === "Nej" ? "checked" : ""} style="width: auto; cursor: pointer;"> Nej
          </label>
        </div>
      `;
    } else {
      container.innerHTML = "";
    }
  };

  sortedTypes.forEach(t => {
    const opt = document.createElement("div");
    opt.className = "dropdown-option" + (t === selectedType ? " selected" : "");
    opt.textContent = t;
    opt.addEventListener("click", () => {
      hidden.value = t;
      labelEl.textContent = t;
      wrapper.querySelectorAll(".dropdown-option").forEach(o => o.classList.remove("selected"));
      opt.classList.add("selected");
      wrapper.classList.remove("open");
      
      // Kör kollen när användaren väljer i listan
      togglePaymentField(t);
    });
    cols.appendChild(opt);
  });

  newTrigger.addEventListener("click", ev => {
    ev.stopPropagation();
    document.querySelectorAll(".custom-select-wrapper.open")
      .forEach(w => { if (w !== wrapper) w.classList.remove("open"); });
    wrapper.classList.toggle("open");
  });

  wrapper.querySelector(".custom-select-dropdown")
    .addEventListener("click", ev => ev.stopPropagation());

  // Om vi redigerar och ett värde redan är satt, kör kollen direkt vid start
  if (selectedType) {
    togglePaymentField(selectedType);
  }
}

function openEditModal(entry) { openModal(entry.type, entry); }
function closeModal() { document.getElementById("overlay").classList.remove("open"); activeModal = null; editingId = null; }
function deleteEntry() {
  document.getElementById("deleteOverlay").classList.add("open");
}
function closeDeleteModal() {
  document.getElementById("deleteOverlay").classList.remove("open");
}
function confirmDelete() {
  entries = entries.filter(e => e.id !== editingId);
  renderEntries();
  closeDeleteModal();
  closeModal();
}
function setStatus(msg, cls) { const el = document.getElementById("formStatus"); if (el) { el.textContent = msg; el.className = "status-msg " + (cls||""); } }

function saveEntry() {
  const selectedDate = document.getElementById("fDate").value || TODAY.iso;
  const now = new Date();
  const existingDayEntry = (["cafe", "tickets", "sales", "daily"].includes(activeModal)) 
    ? entries.find(e => e.type === activeModal && e.ts.split('T')[0] === selectedDate) : null;
  
  let id = existingDayEntry ? existingDayEntry.id : (editingId || Date.now());
  let logTs = (editingId || existingDayEntry) ? (entries.find(e=>e.id===id)?.logTs || now.toISOString()) : now.toISOString();
  const ts = `${selectedDate}T${now.toTimeString().split(' ')[0]}`;
  let entry = { id, ts, logTs, type: activeModal };

  // Nollställ eventuella tidigare felmarkeringar
  const resetStyle = (el) => {
    if (el) {
      el.style.borderColor = "";
      el.style.boxShadow = "";
    }
  };
  document.querySelectorAll('input, textarea, .custom-select-trigger').forEach(resetStyle);
  setStatus("", "");

  // --- VALIDERING & DATAINSLAMLING ---

  if (activeModal === "school") {
    entry.place = document.getElementById("fPlace").value;
    entry.school = document.getElementById("fSchool").value.trim();
    entry.level = document.getElementById("fLevel").value;
    entry.count = parseInt(document.getElementById("fCount").value) || 0;

    const levelTrigger = document.getElementById("levelSelectWrapper").querySelector(".custom-select-trigger");
    const countInput = document.getElementById("fCount");

    // Kontroll: Både nivå och antal saknas
    if (!entry.level && !entry.count) {
      levelTrigger.style.borderColor = "var(--danger)";
      levelTrigger.style.boxShadow = "0 0 0 3px rgba(201,42,42,0.15)";
      countInput.style.borderColor = "var(--danger)";
      countInput.style.boxShadow = "0 0 0 3px rgba(201,42,42,0.15)";
      setStatus("Välj skolnivå och ange antal elever.", "error");
      return;
    }
    // Kontroll: Endast nivå saknas
    if (!entry.level) {
      levelTrigger.style.borderColor = "var(--danger)";
      levelTrigger.style.boxShadow = "0 0 0 3px rgba(201,42,42,0.15)";
      setStatus("Välj en skolnivå.", "error");
      return;
    }
    // Kontroll: Endast antal saknas
    if (!entry.count) {
      countInput.style.borderColor = "var(--danger)";
      countInput.style.boxShadow = "0 0 0 3px rgba(201,42,42,0.15)";
      setStatus("Ange antal elever.", "error");
      return;
    }

} else if (activeModal === "group") {
    entry.groupType = document.getElementById("fGroupType").value;
    entry.count = parseInt(document.getElementById("fCount").value) || 0;
    const groupTrigger = document.getElementById("groupTypeWrapper").querySelector(".custom-select-trigger");
    const countInput = document.getElementById("fCount");

    // Kontroll: Typ av grupp saknas
    if (!entry.groupType) {
      groupTrigger.style.borderColor = "var(--danger)";
      groupTrigger.style.boxShadow = "0 0 0 3px rgba(201,42,42,0.15)";
      setStatus("Välj typ av grupp.", "error");
      return;
    }
    // Kontroll: Antal saknas
    if (!entry.count) {
      countInput.style.borderColor = "var(--danger)";
      countInput.style.boxShadow = "0 0 0 3px rgba(201,42,42,0.15)";
      setStatus("Ange antal personer.", "error");
      return;
    }

    // NYTT: Hantera betalningsstatus för specifika grupper
    const triggerTypes = ["Bröllop", "Barnkalas", "Visning mot betalning"];
    if (triggerTypes.includes(entry.groupType)) {
      const paidRadio = document.querySelector('input[name="fPaid"]:checked');
      if (!paidRadio) {
        const paymentRow = document.getElementById("paymentStatusRow").firstElementChild;
        if (paymentRow) {
          paymentRow.style.borderColor = "var(--danger)";
          paymentRow.style.boxShadow = "0 0 0 3px rgba(201,42,42,0.15)";
        }
        setStatus("Du måste välja om gruppen har betalat.", "error");
        return;
      }
      entry.paid = paidRadio.value; // Sparar "Ja" eller "Nej" i objektet
    }

    entry.note = document.getElementById("fNote").value.trim();

  } else if (["cafe", "tickets", "sales"].includes(activeModal)) {
    const amountInput = document.getElementById("fTotalAmount");
    const totalVal = parseFloat(amountInput.value);

    // Kontroll: Belopp saknas eller är ogiltigt
    if (isNaN(totalVal) || totalVal <= 0) {
      amountInput.style.borderColor = "var(--danger)";
      amountInput.style.boxShadow = "0 0 0 3px rgba(201,42,42,0.15)";
      setStatus("Ange ett giltigt belopp.", "error");
      return;
    }
    entry.amount = totalVal;

  } else if (activeModal === "daily") {
    const reportInput = document.getElementById("fReport");
    entry.report = reportInput.value.trim();

    // Kontroll: Rapport saknas
    if (!entry.report) {
      reportInput.style.borderColor = "var(--danger)";
      reportInput.style.boxShadow = "0 0 0 3px rgba(201,42,42,0.15)";
      setStatus("Rapporten kan inte vara tom.", "error");
      return;
    }
  }

  // --- SPARA ---
  const idx = entries.findIndex(e => e.id === id);
  if (idx > -1) entries[idx] = entry; else entries.push(entry);
  
  renderEntries(); 
  closeModal();
}

function sendDataEmail() {
  const now = new Date();
  const todayStr = now.toISOString().split('T')[0];
  
  // Hjälpfunktion för att sortera posterna efter datum i fallande ordning
  const getSortedData = (type) => [...entries].filter(e => e.type === type).sort((a,b) => b.ts.localeCompare(a.ts));

// 1. Skolbesök CSV
  let schoolCsv = "1. Skolbesök\n\når;månad;kommun;skolnivå;antal;notering\n";
  getSortedData("school").forEach(e => {
    const d = new Date(e.ts.split('T')[0]);
    const year = d.getFullYear();
    const monthShort = MONTHS_SHORT[d.getMonth()];
    
    // Rensa noteringen från semikolon och radbrytningar så att CSV:n förblir intakt
    const cleanNote = (e.school || "").replace(/;/g, ",").replace(/\r?\n/g, " ");
    
    schoolCsv += `${year};${monthShort};${e.place};${e.level};${e.count};${cleanNote}\n`;
  });

  // 2. Gruppbesök CSV
  let groupCsv = "2. Gruppbesök\n\når;mån;datum;kategori;betalkat;betald;antal;notering\n";
  getSortedData("group").forEach(e => {
    const d = new Date(e.ts.split('T')[0]);
    const year = d.getFullYear();
    const monthShort = MONTHS_SHORT[d.getMonth()].toLowerCase();
    const dateStr = e.ts.split('T')[0];
    const category = e.groupType.toLowerCase();
    
    const triggerTypes = ["bröllop", "barnkalas", "visning mot betalning"];
    const betalkat = triggerTypes.includes(category) ? "ja" : "nej";
    const betald = e.paid ? e.paid.toLowerCase() : "nej";
    
    // Rensa noteringen från semikolon och radbrytningar
    const cleanNote = (e.note || "").replace(/;/g, ",").replace(/\r?\n/g, " ");
    
    groupCsv += `${year};${monthShort};${dateStr};${category};${betalkat};${betald};${e.count};${cleanNote}\n`;
  });

  // 3. Entréintäkter CSV
  let ticketsCsv = "3. Entreintäkter\n\ndatum;intäkt\n";
  getSortedData("tickets").forEach(e => {
    ticketsCsv += `${e.ts.split('T')[0]};${Math.round(e.amount)}\n`;
  });

  // 4. Butiksförsäljning CSV
  let salesCsv = "4. Butiksförsäljning\n\ndatum;intakt\n";
  getSortedData("sales").forEach(e => {
    salesCsv += `${e.ts.split('T')[0]};${Math.round(e.amount)}\n`;
  });

  // 5. Kaféförsäljning CSV
  let cafeCsv = "5. Kaféförsäljning\n\ndatum;intakt\n";
  getSortedData("cafe").forEach(e => {
    cafeCsv += `${e.ts.split('T')[0]};${Math.round(e.amount)}\n`;
  });

  // 6. Dagsrapport CSV
  let dailyCsv = "6. Dagsrapport\n\ndatum;dagsrapport\n";
  getSortedData("daily").forEach(e => {
    const cleanReport = e.report.replace(/\r?\n/g, " ");
    dailyCsv += `${e.ts.split('T')[0]};${cleanReport}\n`;
  });

  // Slå samman alla block till en enda stor textmassa
  const emailBody = `${schoolCsv}\n${groupCsv}\n${ticketsCsv}\n${salesCsv}\n${cafeCsv}\n${dailyCsv}`;
  const subject = `Receptionens dagsdata ${todayStr}`;
  
  // Bygg mailto-strängen med korrekt URL-encoding
  const mailtoUrl = `mailto:johan.hofvendahl@kulturen.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(emailBody)}`;

  // Skicka användaren till mailklienten
  window.location.href = mailtoUrl;
}

document.querySelectorAll(".action-btn").forEach(btn => btn.addEventListener("click", () => openModal(btn.dataset.modal)));
document.getElementById("modalClose").addEventListener("click", closeModal);
document.getElementById("overlay").addEventListener("click", e => { if (e.target.id === "overlay") closeModal(); });
document.addEventListener("click", () => {
  document.querySelectorAll(".custom-select-wrapper.open")
    .forEach(w => w.classList.remove("open"));
});
document.getElementById("deleteOverlay").addEventListener("click", e => {
  if (e.target.id === "deleteOverlay") closeDeleteModal();
});
updateStats();
</script>
