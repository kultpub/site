<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generera tabell → PNG</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto&family=Open+Sans&family=Lato&family=Montserrat&family=Inter&family=Archivo+Black&family=SN+Pro&family=Merriweather&family=Raleway&family=Nunito&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body {
    font-family: Roboto, sans-serif;
    background:#eef1f5;
    padding:30px;
    color:#222;
}

h1 {margin-bottom:20px;}

.panel {
    background: white;
    padding: 16px 18px;
    border-radius: 12px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    margin-bottom: 20px;
    margin-left: auto;
    margin-right: auto;
    max-width: 1200px; 
}

.controls-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 14px 18px;
    align-items: flex-end;
    justify-content: center; 
}

.control {
    display:flex;
    flex-direction:column;
    gap:4px;
}

label {
    font-size:12px;
    font-weight:600;
    color:#555;
}

input, select {
    font-size:14px;
    padding:6px 8px;
    border:1px solid #c9ced6;
    border-radius:6px;
    background:white;
}

input:focus, select:focus {
    outline:none;
    border-color:#1f4fd8;
    box-shadow:0 0 0 2px rgba(31,79,216,0.15);
}

.w40 { width:40px; }
.w70 { width:70px; }
.w100 { width:100px; }
.color-input { width:46px; padding:2px; height:32px; }

button {
    padding:10px 16px;
    border:none;
    border-radius:6px;
    font-weight:600;
    cursor:pointer;
}

.export-transparent {
    background: #e3e7ef;;
    color: #000000;
    border: 1px solid #333;
}

.export-transparent:hover {
    background: #1f4fd8;
    color: #ffffff;
}

#tableWrap {
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 8px 24px rgba(0,0,0,0.08);
    display:block;
    width:fit-content;
    margin:10px auto 0;
}

/* --- TABELL-STYLING (RENSAD) --- */
table {
    border-collapse: collapse;
}

td {
    padding: 0px 14px;
    min-width: 120px;
    height: auto;
    line-height: 1.2;
    /* Ingen border här - styrs av JS */
}

.table-frame table {
    table-layout: auto;
}

.table-frame table:hover td {
    outline: 1px dashed #bbb;
    outline-offset: -1px;
}

.table-frame td:focus-within {
    outline: 1px solid #1f4fd8 !important;
    outline-offset: -1px;
}

.table-frame td {
    min-width: 60px;
    color: #000;
}

td[contenteditable]{outline:none;}

.table-frame {
    display: inline-block;
    overflow: hidden;
    background: #fff;
    /* Ingen border eller border-radius här - styrs av JS */
}

/* --- EXPORT-KNAPPAR & ÖVRIGT --- */
.export-buttons {
    position: fixed;
    top: 20px;
    right: 30px;
    display: flex;
    gap: 10px;
    z-index: 1000;
}

.export-buttons button {
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

.cell-inner {
    height: 100%;
    display: flex;
    align-items: center;      
    justify-content: flex-end;
}

.cell-inner span {
    display: inline-block;
    width: 100%;
    outline: none;
}

.export-white {
    background: #ffffff;
    color: #000000;
    border: 1px solid #333;
}

.export-white:hover {
    background: #1f4fd8;
    color: #ffffff;
}

.export-copy {
    background: #1f4fd8;
    color: #ffffff;
    border: 1px solid #1f4fd8;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    padding: 0;
}

.export-buttons .export-copy {
    min-width: 40px;
    width: 40px;
    padding: 0;
    justify-content: center;
}

.export-buttons button {
    display: inline-flex;
    align-items: center;
    justify-content: flex-start; 
    gap: 12px;
    padding: 0 20px;
    height: 40px;
    min-width: 40px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    line-height: 1;
    transition: all 0.2s;
    cursor: pointer;
}

.export-clear {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: #ffffff;
    color: #dc3545;
    border: 1px solid #dc3545;
    height: 32px;
    padding: 0 12px;
    font-size: 13px;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
}

.export-clear:hover {
    background: #dc3545;
    color: #ffffff;
}

.export-clear .material-icons {
    font-size: 18px;
}

/* Visa stödlinjer vid hover om stilen saknar vertikala linjer */
.table-frame table:not(.is-editing):hover td {
    outline: 1px dashed #ccc; /* Vi använder outline för att inte påverka tabellens storlek */
    outline-offset: -1px;
}

/* När vi klickar i en cell (fokus), döljer vi alla stödlinjer */
.table-frame table.is-editing td {
    outline: none !important;
}

/* Styling för bild-modal 2x2 */
.style-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr); /* Tvingar 2 kolumner */
    gap: 15px;
    margin: 20px 0;
}

.style-item {
    cursor: pointer;
    border: 2px solid #eee;
    border-radius: 8px;
    background: #fff;
    display: flex;
    flex-direction: column;
    transition: all 0.2s;
    overflow: hidden;
}

.style-item:hover {
    border-color: #1f4fd8;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.style-item.active {
    border-color: #1f4fd8;
    background: #f0f4ff;
}

.style-img-container {
    width: 100%;
    height: 140px;
    background: #f9f9f9;
    display: flex;
    align-items: center;
    justify-content: center;
}

.style-item img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    padding: 5px;
}

.style-item span {
    display: block;
    padding: 5px;
    font-size: 11px;
    font-weight: 700;
    text-align: center;
    border-top: 1px solid #eee;
    color: #444;
}

* Enhetlig styling för alla kontrollknappar */
#boldBtn, .style-trigger, .export-clear {
    height: 35px; /* Samma höjd som dina select-boxar och inputs */
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0 12px;
    box-sizing: border-box; /* Viktigt: inkluderar border i höjden */
    vertical-align: bottom;
}

/* Specifikt för F-knappen så den inte blir för bred */
#boldBtn {
    width: 35px;
    padding: 0;
}
</style>
</head>
<body>

<div class="export-buttons">
    <button class="export-copy" onclick="copyToClipboard()" title="Kopiera till urklipp">
        <span class="material-icons">content_copy</span>
    </button>
    <button class="export-white" onclick="downloadPNG(false)">
        <span class="material-icons">file_download</span> PNG vit bakgrund
    </button>
    <button class="export-transparent" onclick="downloadPNG(true)">
        <span class="material-icons">file_download</span> PNG transparent
    </button>
</div>

<h1>Tabellgenerator för tryck och digital publicering</h1>

<div class="panel controls-grid">

    <div class="control">
        <label>Kolumner</label>
        <input type="number" class="w40" id="cols" min="1" max="12" value="6">
    </div>

    <div class="control">
        <label>Rader</label>
        <input type="number" class="w40" id="rows" min="1" max="20" value="6">
    </div>

    <div class="control">
        <label>Radhöjd</label>
        <input type="number" class="w40" id="rowHeight" min="10" max="120" value="35">
    </div>

    <div class="control">
        <label>Headerfärg</label>
        <input type="color" class="color-input" id="headerColor" value="#dbe4ff" style="height: 30px;">
    </div>

    <div class="control">
        <label>Headertext</label>
        <input type="color" class="color-input" id="headerTextColor" value="#000000" style="height: 30px;">
    </div>

    <div class="control">
        <label>Typsnitt</label>
		<select class="medium-input" id="fontSelect" style="height: 30px;">
			<option>SN Pro</option>
			<option>Inter</option>
			<option>Archivo Black</option>
			<option>Montserrat</option>
			<option selected>Roboto</option>
			<option>Open Sans</option>
			<option>Lato</option>
			<option>Merriweather</option>
			<option>Raleway</option>
			<option>Nunito</option>
		</select>
    </div>

    <div class="control">
        <label>Textstorlek</label>
        <input type="number" class="w40" id="fontSize" min="10" max="40" value="16">
    </div>
	
	<div class="control">
		<label>Format</label>
		<button type="button" id="boldBtn" onclick="toggleBold()" style="display: inline-flex; align-items: center; justify-content: center; background: white; border: 1px solid #c9ced6; border-radius: 6px; width: 35px; height: 30px; cursor: pointer; transition: all 0.2s; font-family: sans-serif; font-weight: 700; font-size: 14px;">
			F
		</button>
	</div>
	
	<div class="control">
    <label>Justering</label>
    <select class="w100" id="textAlign" style="height: 30px;">
        <option value="right" selected>Höger</option>
        <option value="center">Centrerat</option>
        <option value="left">Vänster</option>
    </select>
	</div>

    <div class="control">
        <label>Hörn</label>
        <select class="w100" id="radius" style="height: 30px;">
            <option value="0">Raka</option>
            <option value="12">Rundade</option>
        </select>
    </div>

	<div class="control">
		<label>Utseende</label>
		<button type="button" class="style-trigger" onclick="openStyleModal()" style="display: inline-flex; align-items: center; gap: 8px; background: white; border: 1px solid #c9ced6; border-radius: 6px; padding: 6px 12px; height: 30px; font-size: 14px; font-weight: 400; cursor: pointer; transition: all 0.2s;">
			<span class="material-icons" style="font-size: 18px;">palette</span> Stil
		</button>
	</div>

    <div class="control">
        <label>DPI</label>
        <select class="w70" id="dpi" style="height:30px;">
            <option value="300">300</option>
            <option value="600">600</option>
        </select>
    </div>
	<div class="control">
        <label>&nbsp;</label>
        <button class="export-clear" onclick="clearTable()" title="Rensa allt innehåll">
            <span class="material-icons">delete_sweep</span> Rensa
        </button>
    </div>

</div>

<div id="tableWrap"></div>

<div id="confirmModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000; align-items:center; justify-content:center;">
    <div style="background:white; padding:25px; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.2); width:320px; text-align:center;">
        <h3 style="margin-top:0; font-size:18px;">Rensa tabell</h3>
        <p style="color:#555; font-size:14px; margin-bottom:25px;">Vill du rensa allt innehåll?</p>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button onclick="closeModal()" style="background:#eef1f5; color:#222; flex:1;">Avbryt</button>
            <button onclick="confirmClear()" style="background:#dc3545; color:white; flex:1;">OK</button>
        </div>
    </div>
</div>

<div id="styleModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000; align-items:center; justify-content:center;">
    <div style="background:white; padding:20px; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.2); width:800px;">
        <h3 style="margin-top:0; text-align:center; font-size:18px;">Välj tabellstil</h3>
        
        <div class="style-grid" id="styleOptions">
            <div class="style-item" onclick="applyStyle('standard')">
                <div class="style-img-container">
                    <img src="standard.png" alt="Standard">
                </div>
                <span>Standard</span>
            </div>
            <div class="style-item" onclick="applyStyle('modern')">
                <div class="style-img-container">
                    <img src="modern.png" alt="Modern">
                </div>
                <span>Modern</span>
            </div>
            <div class="style-item" onclick="applyStyle('column_focus')">
                <div class="style-img-container">
                    <img src="kolumn.png" alt="Kolumn">
                </div>
                <span>Kolumn</span>
            </div>
            <div class="style-item" onclick="applyStyle('forest')">
                <div class="style-img-container">
                    <img src="skog.png" alt="Skog">
                </div>
                <span>Skogsgrön</span>
            </div>
        </div>

        <button onclick="closeStyleModal()" style="width:100%; background:#fff; color:#666; padding:10px; border:1px solid #ccc; border-radius:6px; font-weight:600; cursor:pointer;">
            Avbryt
        </button>
    </div>
</div>

<script>
const TABLE_STYLES = {
    standard: {
        name: "Standard",
        headerBg: "#dbe4ff",
        headerText: "#000000",
        headerFont: null,
        headerBorderBottom: null,
        rowHeight: 35,
        verticalLines: true,
        horizontalLines: true,
        zebra: false,
        zebraText: "#000000",
        columnFocus: false,
        borderColor: "#333333",
        outerBorder: true,
        bottomLine: null,
        radius: 0,
        fontFamily: "Roboto"
    },
    modern: {
        name: "Modern",
        headerBg: "#009879",
        headerText: "#ffffff",
        headerFont: null,
        headerBorderBottom: null,
        rowHeight: 45,
        verticalLines: false,
        horizontalLines: true,
        zebra: "#f3f3f3",
        zebraText: "#009879",
        columnFocus: false,
        borderColor: "#dddddd",
        outerBorder: true,
        bottomLine: "#009879",
        radius: 12,
        fontFamily: "Montserrat"
    },
    column_focus: {
        name: "Column Focus",
        headerBg: "#7d12ff",
        headerText: "#ffffff",
        headerFont: null,
        headerBorderBottom: null,
        rowHeight: 45,
        verticalLines: false,
        horizontalLines: true,
        zebra: false,
        zebraText: "#000000",
        columnFocus: "#f5f6ff",
        borderColor: "#eeeeee",
        outerBorder: true,
        bottomLine: "#7d12ff",
        radius: 12,
        fontFamily: "Open Sans"
    },
forest: {
        name: "Forest",
        headerBg: "#59736e",
        headerText: "#ffffff",
        headerFont: null,
        headerBorderBottom: null,
        rowHeight: 45,
        verticalLines: false,
        horizontalLines: true,
        zebra: "#f3f3f3",
        zebraText: "#59736e",
        columnFocus: false,
        borderColor: "#dddddd",
        outerBorder: true,
        bottomLine: "#59736e",
        radius: 12,
        fontFamily: "Raleway"
    }
};

let currentStyleKey = "standard";

const wrap = document.getElementById("tableWrap");
const colsInput = document.getElementById("cols");
const rowsInput = document.getElementById("rows");
const rowHeightInput = document.getElementById("rowHeight");
const fontSizeInput = document.getElementById("fontSize");
const headerColorInput = document.getElementById("headerColor");
const headerTextColorInput = document.getElementById("headerTextColor");
const fontSelect = document.getElementById("fontSelect");
const radiusInput = document.getElementById("radius");
const textAlignSelect = document.getElementById("textAlign");

let activeCell = null;

/* ================= INIT ================= */
colsInput.addEventListener("input", generateTable);
rowsInput.addEventListener("input", generateTable);
[rowHeightInput, fontSizeInput, fontSelect, radiusInput, headerColorInput, headerTextColorInput]
    .forEach(el => el.addEventListener("input", updateStyles));

textAlignSelect.addEventListener("input", () => {
    if (!activeCell) return;

    const editor = activeCell.querySelector(".cell-inner span");
    if (!editor) return;

    editor.dataset.align = textAlignSelect.value;
    applyCellAlignment(activeCell);
});

/* ================= STILFUNKTIONER och MODAL ================= */
function applyStyle(styleKey) {
    const config = TABLE_STYLES[styleKey];
    if (!config) return;

    currentStyleKey = styleKey;

    // 1. Uppdatera kontrollpanelens synliga inputs
    headerColorInput.value = config.headerBg;
    headerTextColorInput.value = config.headerText;
    rowHeightInput.value = config.rowHeight;
    radiusInput.value = config.radius;
    
    if (config.fontFamily) {
        fontSelect.value = config.fontFamily;
    }

    // 2. Visuell feedback i modal-rutnätet
    const items = document.querySelectorAll('.style-item');
    items.forEach(item => {
        item.classList.remove('active');
        if (item.getAttribute('onclick').includes(styleKey)) {
            item.classList.add('active');
        }
    });

    // 3. VERKSTÄLL STILEN
    // Vi anropar updateStyles för att rita om tabellen med de nya värdena
    updateStyles();
    
    // Stäng modalen
    closeStyleModal();
}

function openStyleModal() {
    document.getElementById("styleModal").style.display = "flex";
}

function closeStyleModal() {
    document.getElementById("styleModal").style.display = "none";
}

// Vi lägger till en lyssnare så man kan stänga även denna modal genom att klicka utanför
window.addEventListener('click', function(event) {
    const sModal = document.getElementById("styleModal");
    if (event.target == sModal) {
        closeStyleModal();
    }
});

/* ================= DATA ================= */
function getExistingData() {
    const data = [];
    const old = document.querySelector(".table-frame table");
    if (!old) return data;

    for (let r = 0; r < old.rows.length; r++) {
        data[r] = [];
        for (let c = 0; c < old.rows[r].cells.length; c++) {
            const editor = old.rows[r].cells[c].querySelector("span");
			data[r][c] = {
				text: editor?.innerText || "",
				align: editor?.dataset.align || "right",
				bold: editor?.dataset.bold || "false" // 🔹 Lägg till denna rad
			};
        }
    }
    return data;
}

function toggleBold() {
    if (!activeCell) return;
    const editor = activeCell.querySelector("span");
    if (!editor) return;

    const isBold = editor.dataset.bold === "true";
    editor.dataset.bold = !isBold;

    // Uppdatera knappens utseende direkt vid klick
    const btn = document.getElementById("boldBtn");
    btn.style.background = !isBold ? "#eef1f5" : "white";
    btn.style.borderColor = !isBold ? "#1f4fd8" : "#c9ced6";
    btn.style.color = !isBold ? "#1f4fd8" : "#222";

    updateStyles();
}

/* ================= TABLE ================= */
function generateTable() {
    const cols = +colsInput.value;
    const rows = +rowsInput.value;
    const existingData = getExistingData();

    const frame = document.createElement("div");
    frame.className = "table-frame";
	const table = document.createElement("table");

    for (let r = 0; r < rows; r++) {
        const tr = document.createElement("tr");

        for (let c = 0; c < cols; c++) {
            const td = document.createElement("td");

            const inner = document.createElement("div");
            inner.className = "cell-inner";

            const editor = document.createElement("span");
            editor.contentEditable = "true";
			editor.addEventListener("input", updateStyles);

            const saved = existingData[r]?.[c];
            editor.innerText = saved?.text || "";
            editor.dataset.align = saved?.align || "right";
			editor.dataset.bold = saved?.bold || "false";

			editor.addEventListener("focus", () => {
				activeCell = td;
				textAlignSelect.value = editor.dataset.align || "right";
				
				// Visuell feedback: Blå ram och ljusgrå bakgrund om F-knappen är aktiv
				const isBold = editor.dataset.bold === "true";
				const btn = document.getElementById("boldBtn");
				btn.style.background = isBold ? "#eef1f5" : "white";
				btn.style.borderColor = isBold ? "#1f4fd8" : "#c9ced6";
				btn.style.color = isBold ? "#1f4fd8" : "#222";
			});

            inner.appendChild(editor);
            td.appendChild(inner);
            tr.appendChild(td);
        }
        table.appendChild(tr);
    }

    frame.appendChild(table);
    wrap.innerHTML = "";
    wrap.appendChild(frame);

    updateStyles();
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
    const paragraphs = text.split('\n');
    let lines = [];

    paragraphs.forEach(paragraph => {
        const words = paragraph.split(' ');
        let currentLine = '';

        for (let n = 0; n < words.length; n++) {
            let testLine = currentLine + words[n] + ' ';
            let metrics = ctx.measureText(testLine);
            let testWidth = metrics.width;

            if (testWidth > maxWidth && n > 0) {
                lines.push(currentLine);
                currentLine = words[n] + ' ';
            } else {
                currentLine = testLine;
            }
        }
        lines.push(currentLine);
    });

    lines.forEach((line, i) => {
        ctx.fillText(line.trim(), x, y + (i * lineHeight) - ((lines.length - 1) * lineHeight) / 2);
    });
}

/* ================= STYLES ================= */
function applyCellAlignment(cell) {
    const inner = cell.querySelector(".cell-inner");
    const editor = inner?.querySelector("span");
    if (!inner || !editor) return;

    const align = editor.dataset.align || "right";

    inner.style.justifyContent =
        align === "left"   ? "flex-start" :
        align === "center" ? "center" :
                             "flex-end";

    editor.style.textAlign = align;
}

function updateStyles() {
    const table = document.querySelector(".table-frame table");
    if (!table) return;

    const config = TABLE_STYLES[currentStyleKey];
    const frame = document.querySelector(".table-frame");
    const radius = +radiusInput.value;

    frame.style.borderRadius = radius + "px";
    frame.style.border = config.outerBorder ? `1px solid ${config.borderColor}` : "none";
    
    table.style.fontFamily = fontSelect.value;
    table.style.fontSize = fontSizeInput.value + "px";
    table.style.borderCollapse = "collapse";

    const rows = table.rows;

    for (let r = 0; r < rows.length; r++) {
        const tr = rows[r];
        const isZebraRow = config.zebra && r > 0 && r % 2 === 0;
        tr.style.backgroundColor = isZebraRow ? config.zebra : "transparent";

        for (let c = 0; c < tr.cells.length; c++) {
            const cell = tr.cells[c];
            const isFocusCol = config.columnFocus && c % 2 === 0;
            
            cell.style.height = rowHeightInput.value + "px";
            cell.style.background = "none";
            cell.style.backgroundColor = "transparent";
            cell.style.border = "none";

            if (isFocusCol && r > 0) {
                cell.style.backgroundColor = config.columnFocus;
            }

            if (config.verticalLines && c < tr.cells.length - 1) {
                cell.style.borderRight = `1px solid ${config.borderColor}`;
            }
            if (config.horizontalLines && r < rows.length - 1) {
                cell.style.borderBottom = `1px solid ${config.borderColor}`;
            }

            const editor = cell.querySelector("span");
            if (!editor) continue;

            if (r === 0) {
                cell.style.background = headerColorInput.value;
                editor.style.color = headerTextColorInput.value;
                editor.style.fontWeight = "700";
                editor.style.fontFamily = config.headerFont || fontSelect.value;
                editor.style.textTransform = config.headerFont ? "uppercase" : "none";
                
                if (config.headerBorderBottom) {
                    cell.style.borderBottom = config.headerBorderBottom;
                }
            } else {
                let textColor = (isZebraRow && config.zebraText) ? headerColorInput.value : "#000000";

                // --- IKON-LOGIK & NEGATIVA TAL ---
                const rawText = editor.textContent.trim().toLowerCase();
                
                if (rawText === "...klar") {
                    editor.innerHTML = '<i class="fa-solid fa-circle-check" style="color: #28a745;"></i>';
                } else if (rawText === "...obs") {
                    editor.innerHTML = '<i class="fa-solid fa-triangle-exclamation" style="color: #ff9800;"></i>';
                } else if (rawText === "...stopp") {
                    editor.innerHTML = '<i class="fa-solid fa-circle-stop" style="color: #dc3545;"></i>';
                } else if (rawText !== "") {
                    const cleanText = rawText.replace('%', '').replace(/\s/g, '').replace(',', '.');
                    const numValue = parseFloat(cleanText);
                    if (!isNaN(numValue) && numValue < 0) {
                        textColor = "#dc3545";
                    }
                    editor.style.color = textColor;
                } else {
                    editor.style.color = textColor;
                }

                editor.style.fontFamily = fontSelect.value;
                editor.style.textTransform = "none";
                editor.style.fontWeight = editor.dataset.bold === "true" ? "700" : "400";
            }
            
            if (config.bottomLine && r === rows.length - 1) {
                cell.style.borderBottom = `2px solid ${headerColorInput.value}`;
            }

            applyCellAlignment(cell);
        }
    }
}

function drawTableOnCanvas(ctx, table, rect, config) {
    const radius = +radiusInput.value;
    const headerColor = headerColorInput.value;
    const headerTextColor = headerTextColorInput.value;
    const font = fontSelect.value;
    const fontSize = +fontSizeInput.value;

    ctx.save();
    if (radius > 0) {
        roundedRectPath(ctx, 0, 0, rect.width, rect.height, radius);
        ctx.clip();
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, rect.width, rect.height);
    }

    const rows = table.rows.length;
    const cols = table.rows[0].cells.length;

    for (let r = 0; r < rows; r++) {
        const isZebraRow = config.zebra && r > 0 && r % 2 === 0;

        for (let c = 0; c < cols; c++) {
            const td = table.rows[r].cells[c];
            const editor = td.querySelector("span");
            const cr = td.getBoundingClientRect();
            const x = cr.left - rect.left;
            const y = cr.top - rect.top;
            const w = cr.width;
            const h = cr.height;

            const isFocusCol = config.columnFocus && c % 2 === 0;

            if (r === 0) {
                ctx.fillStyle = headerColor;
            } else if (isZebraRow) {
                ctx.fillStyle = config.zebra;
            } else if (isFocusCol) {
                ctx.fillStyle = config.columnFocus;
            } else {
                ctx.fillStyle = "#ffffff";
            }
            ctx.fillRect(x, y, w, h);

            ctx.strokeStyle = config.borderColor;
            ctx.lineWidth = 1;

            if (config.verticalLines && c < cols - 1) {
                ctx.beginPath(); ctx.moveTo(x + w, y); ctx.lineTo(x + w, y + h); ctx.stroke();
            }
            if (config.horizontalLines && r < rows - 1) {
                ctx.beginPath(); ctx.moveTo(x, y + h); ctx.lineTo(x + w, y + h); ctx.stroke();
            }

            if (r === 0 && config.headerBorderBottom) {
                ctx.save(); ctx.strokeStyle = "#000000"; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(x, y + h); ctx.lineTo(x + w, y + h); ctx.stroke(); ctx.restore();
            }

            if (config.bottomLine && r === rows.length - 1) {
                ctx.save(); ctx.strokeStyle = headerColor; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(x, y + h); ctx.lineTo(x + w, y + h); ctx.stroke(); ctx.restore();
            }

            // --- TEXT & IKON RENDERING ---
            let textValue = editor?.innerText.trim() || "";
            const align = editor?.dataset.align || "right";
            let currentFont = font;
            let currentWeight = editor?.dataset.bold === "true" ? "700 " : "400 ";
            let isIcon = false;

            if (r === 0) {
                ctx.fillStyle = headerTextColor;
                currentFont = config.headerFont || font;
                currentWeight = "700 ";
                if (config.headerFont) textValue = textValue.toUpperCase();
            } else {
                const checkText = textValue.toLowerCase();
                // Kolla efter ikoner först
                if (checkText === "...klar" || editor.querySelector('.fa-circle-check')) {
                    ctx.fillStyle = "#28a745";
                    ctx.font = "900 " + fontSize + "px 'Font Awesome 6 Free'";
                    textValue = "\uf058"; 
                    isIcon = true;
                } else if (checkText === "...obs" || editor.querySelector('.fa-triangle-exclamation')) {
                    ctx.fillStyle = "#ffc107";
                    ctx.font = "900 " + fontSize + "px 'Font Awesome 6 Free'";
                    textValue = "\uf071";
                    isIcon = true;
                } else if (checkText === "...stopp" || editor.querySelector('.fa-circle-stop')) {
                    ctx.fillStyle = "#dc3545";
                    ctx.font = "900 " + fontSize + "px 'Font Awesome 6 Free'";
                    textValue = "\uf28d"; // Unicode för circle-stop
                    isIcon = true;
                } else {
                    ctx.fillStyle = (isZebraRow && config.zebraText) ? headerColor : "#000000";
                    const cleanText = textValue.replace('%', '').replace(/\s/g, '').replace(',', '.');
                    const numValue = parseFloat(cleanText);
                    if (!isNaN(numValue) && numValue < 0) ctx.fillStyle = "#dc3545";
                }
            }

            if (!isIcon) {
                ctx.font = currentWeight + fontSize + "px " + currentFont;
            }

            ctx.textBaseline = "middle";
            ctx.textAlign = align;
            const tx = align === "left" ? x + 8 : align === "center" ? x + w / 2 : x + w - 8;
            
            wrapText(ctx, textValue, tx, y + h / 2, w - 16, fontSize * 1.2);
        }
    }
    ctx.restore();

    if (config.outerBorder) {
        ctx.save(); ctx.strokeStyle = config.borderColor; ctx.lineWidth = 1;
        if (radius > 0) { roundedRectPath(ctx, 0.5, 0.5, rect.width - 1, rect.height - 1, radius); }
        else { ctx.beginPath(); ctx.rect(0.5, 0.5, rect.width - 1, rect.height - 1); }
        ctx.stroke(); ctx.restore();
    }
}

/* ================= Copy ================= */
async function copyToClipboard() {
    const frame = document.querySelector(".table-frame");
    const table = frame?.querySelector("table");
    if (!table) return alert("Skapa tabellen först.");

    const rect = frame.getBoundingClientRect();
    const canvas = document.createElement("canvas");
    const scale = 2; 
    canvas.width = Math.ceil(rect.width * scale);
    canvas.height = Math.ceil(rect.height * scale);
    const ctx = canvas.getContext("2d");
    ctx.scale(scale, scale);

    // Fyll hela ytan vit (för Word/Outlook)
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, rect.width, rect.height);

    const config = TABLE_STYLES[currentStyleKey];
    drawTableOnCanvas(ctx, table, rect, config);

    canvas.toBlob(async (blob) => {
        try {
            const item = new ClipboardItem({ "image/png": blob });
            await navigator.clipboard.write([item]);
            
            const btn = document.querySelector(".export-copy");
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<span class="material-icons">check</span>';
            btn.style.background = "#28a745";
            
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.style.background = "#1f4fd8";
            }, 2000);
        } catch (err) {
            alert("Kunde inte kopiera. HTTPS krävs.");
        }
    }, "image/png");
}

    }
}

/* ================= PNG EXPORT ================= */
function roundedRectPath(ctx, x, y, w, h, r) {
    const rr = Math.max(0, Math.min(r, Math.min(w, h) / 2));
    ctx.beginPath();
    ctx.moveTo(x + rr, y);
    ctx.arcTo(x + w, y, x + w, y + h, rr);
    ctx.arcTo(x + w, y + h, x, y + h, rr);
    ctx.arcTo(x, y + h, x, y, rr);
    ctx.arcTo(x, y, x + w, y, rr);
    ctx.closePath();
}

function setPNGdpi(blob, dpi) {
    return blob.arrayBuffer().then(buffer => {
        const ppm = Math.round(dpi * 39.3701);
        const data = new Uint8Array(buffer);
        let offset = 8;

        while (offset < data.length) {
            const length = (data[offset]<<24)|(data[offset+1]<<16)|(data[offset+2]<<8)|data[offset+3];
            const type = String.fromCharCode(data[offset+4],data[offset+5],data[offset+6],data[offset+7]);
            offset += 12 + length;
            if (type === "IHDR") break;
        }

        const phys = new Uint8Array(21);
        const dv = new DataView(phys.buffer);
        dv.setUint32(0, 9);
        phys.set([112,72,89,115], 4);
        dv.setUint32(8, ppm);
        dv.setUint32(12, ppm);
        phys[16] = 1;

        function crc32(buf) {
            let c = ~0;
            for (let i = 4; i < 17; i++) {
                c ^= buf[i];
                for (let k = 0; k < 8; k++)
                    c = (c>>>1) ^ (0xEDB88320 & -(c&1));
            }
            return ~c >>> 0;
        }
        dv.setUint32(17, crc32(phys));

        const newData = new Uint8Array(data.length + phys.length);
        newData.set(data.slice(0, offset), 0);
        newData.set(phys, offset);
        newData.set(data.slice(offset), offset + phys.length);
        return new Blob([newData], {type: "image/png"});
    });
}

function downloadPNG(transparent) {
    const frame = document.querySelector(".table-frame");
    const table = frame?.querySelector("table");
    if (!table) return alert("Skapa tabellen först.");

    const dpi = +document.getElementById("dpi").value;
    const scale = dpi / 96;
    const rect = frame.getBoundingClientRect();
    const canvas = document.createElement("canvas");
    canvas.width = Math.ceil(rect.width * scale);
    canvas.height = Math.ceil(rect.height * scale);

    const ctx = canvas.getContext("2d");
    ctx.scale(scale, scale);

    if (!transparent) {
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, rect.width, rect.height);
    }

    const config = TABLE_STYLES[currentStyleKey];
    drawTableOnCanvas(ctx, table, rect, config);

    canvas.toBlob(blob => {
        setPNGdpi(blob, dpi).then(finalBlob => {
            const link = document.createElement("a");
            link.download = transparent ? "tabell_transparent.png" : "tabell_vit.png";
            link.href = URL.createObjectURL(finalBlob);
            link.click();
        });
    }, "image/png");
}
